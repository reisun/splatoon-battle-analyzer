services:
  app:
    build: .
    ports:
      - "8020:8000"
    volumes:
      - .:/app
      - ~/.claude.json:/home/appuser/.claude.json:ro
      - ~/.claude:/home/appuser/.claude:ro
      - shared-data:/shared-data
    env_file:
      - .env
    working_dir: /app
    restart: unless-stopped

volumes:
  shared-data:
    name: shared-data
