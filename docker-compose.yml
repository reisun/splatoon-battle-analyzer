services:
  app:
    build: .
    ports:
      - "8020:8000"
    volumes:
      - .:/app
      - shared-data:/shared-data
    env_file:
      - .env
    environment:
      - AGENT_GATEWAY_URL=http://llm-internal-proxy/agent
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    working_dir: /app
    restart: unless-stopped
    networks:
      - default
      - llm-network

volumes:
  shared-data:
    name: shared-data

networks:
  llm-network:
    external: true
    name: llm-network
