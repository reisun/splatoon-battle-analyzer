services:
  app:
    build: .
    ports:
      - "8020:8000"
    volumes:
      - .:/app
      - ~/.claude.json:/home/appuser/.claude.json:ro
      - ~/.claude:/home/appuser/.claude:ro
    env_file:
      - .env
    working_dir: /app
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    external: true
